# docker-compose.yml для OpenVitals в Dokploy
# Postgres рекомендуется поднять отдельным ресурсом "Database" в самом Dokploy
# (там будут нормальные бэкапы), а сюда прокинуть готовый DATABASE_URL.
# Если хочешь поднять Postgres прямо здесь — раскомментируй блок в конце файла.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    environment:
      DATABASE_URL: ${DATABASE_URL}
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL}
      AI_DEFAULT_MODEL: ${AI_DEFAULT_MODEL:-claude-sonnet-4-20250514}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      BLOB_STORAGE_PROVIDER: local
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      RENDER_WORKER_URL: http://worker:4000
      RENDER_WEBHOOK_SECRET: ${RENDER_WEBHOOK_SECRET}
      NODE_ENV: production
      # опционально:
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      WHOOP_CLIENT_ID: ${WHOOP_CLIENT_ID:-}
      WHOOP_CLIENT_SECRET: ${WHOOP_CLIENT_SECRET:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
    volumes:
      - uploads:/app/apps/web/uploads
    expose:
      - "3000"
    restart: unless-stopped
    networks:
      - default
      - dokploy-network

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: ${DATABASE_URL}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      RENDER_WEBHOOK_SECRET: ${RENDER_WEBHOOK_SECRET}
      NODE_ENV: production
    volumes:
      - uploads:/app/apps/web/uploads
    expose:
      - "4000"
    restart: unless-stopped
    depends_on:
      - web
    networks:
      - default
      - dokploy-network

volumes:
  uploads:

# dokploy-network — общая сеть Dokploy, в которой поднят внешний Postgres.
# Подключаем к ней web и worker, чтобы оба резолвили хост БД по имени.
# Если у тебя сеть называется иначе — поправь имя здесь и в сервисах.
networks:
  dokploy-network:
    external: true

